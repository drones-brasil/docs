name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Generate sidebars/authors
        run: pnpm gen

      - name: Validate content references
        run: pnpm validate:content

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

